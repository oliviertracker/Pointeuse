<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracker Horaires Full</title>
<style>
:root {
  --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
  --border: rgba(255,255,255,0.09);
  --text: #f0f0f0; --text2: #888;
  --blue: #60a5fa; --green: #34d399; --orange: #fb923c;
  --radius: 12px; --ih: 30px;
  --safe-top: env(safe-area-inset-top, 0px);
}
@media (prefers-color-scheme: light) {
  :root { --bg: #f5f5f5; --bg2: #ffffff; --bg3: #ebebeb; --border: rgba(0,0,0,0.08); --text: #111; --text2: #666; }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:-apple-system,system-ui,sans-serif;color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column;}
.app{flex:1;display:flex;flex-direction:column;padding-top:var(--safe-top);}

/* Header */
.header{padding:15px;text-align:center;border-bottom:0.5px solid var(--border);}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.nav-btn{background:var(--bg3);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;}

/* Navigation Tabs */
.tabs{display:flex;background:var(--bg3);margin:0 15px 15px;border-radius:12px;padding:3px;}
.tab{flex:1;padding:10px;border:none;background:none;color:var(--text2);font-size:12px;font-weight:700;border-radius:10px;transition:0.2s;}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 5px rgba(0,0,0,0.2);}

/* Panels */
.content{flex:1;overflow-y:auto;padding:0 15px 100px;}
.panel{display:none;} .panel.active{display:block;}

/* Cards */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px;}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.tag{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--text2);letter-spacing:1px;}
.dur-tag{font-size:14px;font-weight:700;color:var(--blue);}

/* Toggles */
.btn-tog{padding:6px 15px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;}
.btn-tog.active{background:rgba(52,211,153,0.15);color:var(--green);border-color:var(--green);}

/* Roulettes */
.row{display:flex;align-items:center;margin-bottom:12px;gap:12px;}
.lbl{font-size:12px;color:var(--text2);width:45px;}
.drums-box{display:flex;align-items:center;gap:6px;background:var(--bg3);padding:4px;border-radius:10px;border:0.5px solid var(--border);}
.drum{width:48px;height:90px;overflow:hidden;position:relative;touch-action:none;}
.drum-list{position:absolute;width:100%;transition:transform 0.15s ease-out;}
.drum-item{height:var(--ih);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
.drum-sel{position:absolute;top:30px;left:0;right:0;height:30px;border-top:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.1);pointer-events:none;background:rgba(255,255,255,0.03);}

/* Summary Styles */
.sum-nav{display:flex;background:var(--bg3);border-radius:8px;padding:2px;margin-bottom:15px;}
.s-tab{flex:1;padding:6px;font-size:10px;border:none;background:none;color:var(--text2);font-weight:700;border-radius:6px;}
.s-tab.active{background:var(--blue);color:white;}
.big-res{text-align:center;padding:20px 0;}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:14px;}
.hist-item:last-child{border:none;}

.save-btn{width:100%;padding:18px;background:var(--blue);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;margin-top:10px;box-shadow:0 4px 15px rgba(96,165,250,0.3);}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="nav-row">
      <button class="nav-btn" onclick="changeDate(-1)">‹</button>
      <div>
        <div id="display-day" style="font-size:11px; color:var(--text2); text-transform:uppercase; font-weight:700">Lundi</div>
        <div id="display-date" style="font-size:19px; font-weight:800">14 Mars</div>
      </div>
      <button class="nav-btn" onclick="changeDate(1)">›</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('day', this)">SAISIE</button>
    <button class="tab" onclick="switchTab('sum', this)">RÉSUMÉS</button>
  </div>

  <div class="content">
    <!-- SAISIE JOURNEE -->
    <div id="p-day" class="panel active">
      <div class="card" id="card-midi">
        <div class="card-hd"><span class="tag">Service Midi</span><span class="dur-tag" id="dur-m">0h00</span><button class="btn-tog" id="tog-midi" onclick="toggleSvc('midi')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums-box" id="dr-mi-in-h"></div><div class="drums-box" id="dr-mi-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums-box" id="dr-mi-out-h"></div><div class="drums-box" id="dr-mi-out-m"></div></div>
      </div>

      <div class="card" id="card-soir">
        <div class="card-hd"><span class="tag">Service Soir</span><span class="dur-tag" id="dur-s">0h00</span><button class="btn-tog" id="tog-soir" onclick="toggleSvc('soir')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums-box" id="dr-so-in-h"></div><div class="drums-box" id="dr-so-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums-box" id="dr-so-out-h"></div><div class="drums-box" id="dr-so-out-m"></div></div>
      </div>

      <div class="card" id="card-full">
        <div class="card-hd"><span class="tag">Journée Continue</span><span class="dur-tag" id="dur-f">0h00</span><button class="btn-tog" id="tog-full" onclick="toggleSvc('full')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums-box" id="dr-fu-in-h"></div><div class="drums-box" id="dr-fu-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums-box" id="dr-fu-out-h"></div><div class="drums-box" id="dr-fu-out-m"></div></div>
      </div>

      <button class="save-btn" onclick="saveData()">ENREGISTRER LA JOURNÉE</button>
    </div>

    <!-- RÉSUMÉS -->
    <div id="p-sum" class="panel">
      <div class="sum-nav">
        <button class="s-tab active" onclick="setSumRange('day', this)">JOUR</button>
        <button class="s-tab" onclick="setSumRange('week', this)">SEMAINE</button>
        <button class="s-tab" onclick="setSumRange('month', this)">MOIS</button>
        <button class="s-tab" onclick="setSumRange('year', this)">ANNÉE</button>
      </div>

      <div class="card big-res">
        <div class="tag" id="sum-title">Total Journée</div>
        <div id="sum-total" style="font-size:42px; font-weight:900; color:var(--blue); margin:10px 0;">0h00</div>
        <div id="sum-subtitle" style="font-size:12px; color:var(--text2)">Aujourd'hui</div>
      </div>

      <div class="card" style="padding:0; overflow:hidden;" id="sum-list-container">
        <div id="sum-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const HOURS = Array.from({length: 24}, (_, i) => i);
const MINS = Array.from({length: 60}, (_, i) => i);
const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let state = {
  date: new Date(),
  range: 'day',
  services: {
    midi: { on: false, inH: 11, inM: 0, outH: 15, outM: 0 },
    soir: { on: false, inH: 18, inM: 30, outH: 23, outM: 0 },
    full: { on: false, inH: 9, inM: 0, outH: 17, outM: 0 }
  }
};

function createDrum(containerId, values, service, key) {
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="drum-sel"></div><div class="drum-list"></div>`;
  const list = container.querySelector('.drum-list');
  [null, ...values, null].forEach(v => {
    const div = document.createElement('div');
    div.className = 'drum-item';
    div.textContent = v !== null ? String(v).padStart(2, '0') : '';
    list.appendChild(div);
  });

  let startY, startIdx;
  container.addEventListener('touchstart', e => {
    if(!state.services[service].on) return;
    startY = e.touches[0].clientY; startIdx = state.services[service][key];
  }, {passive: true});

  container.addEventListener('touchmove', e => {
    if(!state.services[service].on) return;
    e.preventDefault();
    const diff = Math.round((startY - e.touches[0].clientY) / 30);
    let newIdx = Math.max(0, Math.min(values.length - 1, startIdx + diff));
    if(state.services[service][key] !== newIdx) {
        state.services[service][key] = newIdx;
        updateDrumPos(container, newIdx);
        renderDay();
    }
  }, {passive: false});
}

function updateDrumPos(container, idx) {
  container.querySelector('.drum-list').style.transform = `translateY(${-(idx * 30)}px)`;
}

function calcDur(s) {
  if(!s.on) return 0;
  let start = s.inH * 60 + s.inM, end = s.outH * 60 + s.outM;
  if(end <= start) end += 1440;
  return end - start;
}

function fmtH(mins) {
  return Math.floor(mins/60) + 'h' + String(mins%60).padStart(2,'0');
}

function toggleSvc(type) {
  state.services[type].on = !state.services[type].on;
  if(type === 'full' && state.services.full.on) { state.services.midi.on = false; state.services.soir.on = false; }
  else if(state.services.full.on) { state.services.full.on = false; }
  renderDay();
}

function renderDay() {
  const d = state.date;
  document.getElementById('display-day').textContent = DAYS[d.getDay()];
  document.getElementById('display-date').textContent = d.getDate() + ' ' + MONTHS[d.getMonth()];

  ['midi','soir','full'].forEach(k => {
    const s = state.services[k];
    const dur = calcDur(s);
    document.getElementById(`tog-${k}`).className = 'btn-tog' + (s.on ? ' active':'');
    document.getElementById(`tog-${k}`).textContent = s.on ? 'SERVICE ON' : 'OFF';
    document.getElementById(`card-${k}`).style.opacity = s.on ? '1' : '0.5';
    document.getElementById(`dur-${k.charAt(0)}`).textContent = fmtH(dur);
    const pfx = k === 'midi'?'mi':(k==='soir'?'so':'fu');
    updateDrumPos(document.getElementById(`dr-${pfx}-in-h`), s.inH);
    updateDrumPos(document.getElementById(`dr-${pfx}-in-m`), s.inM);
    updateDrumPos(document.getElementById(`dr-${pfx}-out-h`), s.outH);
    updateDrumPos(document.getElementById(`dr-${pfx}-out-m`), s.outM);
  });
}

function saveData() {
  localStorage.setItem('work_'+state.date.toISOString().split('T')[0], JSON.stringify(state.services));
  alert("Journée enregistrée !");
  if(document.getElementById('p-sum').classList.contains('active')) renderSummary();
}

function changeDate(n) {
  state.date.setDate(state.date.getDate() + n);
  loadSavedData();
  renderDay();
  if(document.getElementById('p-sum').classList.contains('active')) renderSummary();
}

function loadSavedData() {
  const saved = localStorage.getItem('work_'+state.date.toISOString().split('T')[0]);
  if(saved) state.services = JSON.parse(saved);
  else state.services = {
    midi: { on: false, inH: 11, inM: 0, outH: 15, outM: 0 },
    soir: { on: false, inH: 18, inM: 30, outH: 23, outM: 0 },
    full: { on: false, inH: 9, inM: 0, outH: 17, outM: 0 }
  };
}

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  el.classList.add('active');
  if(id === 'sum') renderSummary();
}

function setSumRange(r, el) {
  state.range = r;
  document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSummary();
}

function getMinsForKey(key) {
    const data = localStorage.getItem(key);
    if(!data) return 0;
    const s = JSON.parse(data);
    return calcDur(s.midi) + calcDur(s.soir) + calcDur(s.full);
}

function renderSummary() {
  const list = document.getElementById('sum-list');
  const title = document.getElementById('sum-title');
  const sub = document.getElementById('sum-subtitle');
  list.innerHTML = '';
  let totalMins = 0;
  const d = state.date;

  if(state.range === 'day') {
    title.textContent = "Total Journée";
    sub.textContent = DAYS[d.getDay()] + " " + d.getDate() + " " + MONTHS[d.getMonth()];
    const s = state.services;
    const m = calcDur(s.midi), so = calcDur(s.soir), f = calcDur(s.full);
    if(m>0) list.innerHTML += `<div class="hist-item"><span>Service Midi</span><b>${fmtH(m)}</b></div>`;
    if(so>0) list.innerHTML += `<div class="hist-item"><span>Service Soir</span><b>${fmtH(so)}</b></div>`;
    if(f>0) list.innerHTML += `<div class="hist-item"><span>Journée Continue</span><b>${fmtH(f)}</b></div>`;
    totalMins = m + so + f;
  } 
  else if(state.range === 'week') {
    title.textContent = "Total Semaine";
    let start = new Date(d); start.setDate(d.getDate() - (d.getDay() + 6) % 7);
    sub.textContent = "Du " + start.getDate() + " au " + new Date(new Date(start).setDate(start.getDate()+6)).getDate() + " " + MONTHS[start.getMonth()];
    for(let i=0; i<7; i++) {
        let curr = new Date(start); curr.setDate(start.getDate() + i);
        let mins = getMinsForKey('work_'+curr.toISOString().split('T')[0]);
        if(mins > 0) list.innerHTML += `<div class="hist-item"><span>${DAYS[curr.getDay()]} ${curr.getDate()}</span><b>${fmtH(mins)}</b></div>`;
        totalMins += mins;
    }
  }
  else if(state.range === 'month') {
    title.textContent = "Total Mensuel";
    sub.textContent = MONTHS[d.getMonth()] + " " + d.getFullYear();
    let days = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    for(let i=1; i<=days; i++) {
        let key = `work_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        let mins = getMinsForKey(key);
        if(mins > 0) list.innerHTML += `<div class="hist-item"><span>${i} ${MONTHS[d.getMonth()].slice(0,3)}</span><b>${fmtH(mins)}</b></div>`;
        totalMins += mins;
    }
  }
  else if(state.range === 'year') {
    title.textContent = "Bilan Annuel";
    sub.textContent = "Année " + d.getFullYear();
    for(let m=0; m<12; m++) {
        let mMins = 0;
        for(let j=1; j<=31; j++) {
            mMins += getMinsForKey(`work_${d.getFullYear()}-${String(m+1).padStart(2,'0')}-${String(j).padStart(2,'0')}`);
        }
        if(mMins > 0) {
            list.innerHTML += `<div class="hist-item"><span>${MONTHS[m]}</span><b>${fmtH(mMins)}</b></div>`;
            totalMins += mMins;
        }
    }
  }
  document.getElementById('sum-total').textContent = fmtH(totalMins);
}

// Initialisation
const svcs = ['mi','so','fu'], types = ['midi','soir','full'];
types.forEach((t, i) => {
  const p = svcs[i];
  createDrum(`dr-${p}-in-h`, HOURS, t, 'inH');
  createDrum(`dr-${p}-in-m`, MINS, t, 'inM');
  createDrum(`dr-${p}-out-h`, HOURS, t, 'outH');
  createDrum(`dr-${p}-out-m`, MINS, t, 'outM');
});

loadSavedData();
renderDay();
</script>
</body>
</html>
