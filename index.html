<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracker Horaires Pro</title>
<style>
:root {
  --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
  --border: rgba(255,255,255,0.09);
  --text: #f0f0f0; --text2: #888;
  --blue: #60a5fa; --green: #34d399;
  --radius: 12px; --ih: 30px;
  --safe-top: env(safe-area-inset-top, 0px);
}
@media (prefers-color-scheme: light) {
  :root { --bg: #f5f5f5; --bg2: #ffffff; --bg3: #ebebeb; --border: rgba(0,0,0,0.08); --text: #111; --text2: #666; }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:-apple-system,system-ui,sans-serif;color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column;}
.app{flex:1;display:flex;flex-direction:column;padding-top:var(--safe-top);}

/* Header & Tabs */
.header{padding:15px;text-align:center;border-bottom:0.5px solid var(--border);}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.nav-btn{background:var(--bg3);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;font-size:18px;}
.tabs{display:flex;background:var(--bg3);margin:0 15px 15px;border-radius:10px;padding:3px;}
.tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:600;border-radius:8px;}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 5px rgba(0,0,0,0.2);}

/* Panels */
.content{flex:1;overflow-y:auto;padding:0 15px 100px;}
.panel{display:none;} .panel.active{display:block;}

/* Cards */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px;}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.tag{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--text2);letter-spacing:1px;}
.dur-tag{font-size:14px;font-weight:700;color:var(--blue);}

/* Toggle Button */
.btn-tog{padding:6px 15px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;}
.btn-tog.active{background:rgba(52,211,153,0.15);color:var(--green);border-color:var(--green);}

/* Drums Multi-Service */
.row{display:flex;align-items:center;margin-bottom:10px;gap:10px;}
.lbl{font-size:11px;color:var(--text2);width:50px;}
.drums{display:flex;align-items:center;gap:4px;background:var(--bg3);padding:4px;border-radius:8px;}
.drum{width:45px;height:90px;overflow:hidden;position:relative;touch-action:none;}
.drum-list{position:absolute;width:100%;transition:transform 0.2s cubic-bezier(0,0,0.2,1);}
.drum-item{height:var(--ih);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;}
.drum-sel{position:absolute;top:30px;left:0;right:0;height:30px;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);pointer-events:none;}

/* Results & Summary */
.res-bar{background:var(--bg2);padding:15px;border-radius:var(--radius);display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px;}
.res-item label{display:block;font-size:9px;color:var(--text2);margin-bottom:4px;}
.res-item span{font-size:14px;font-weight:700;}
.save-btn{width:100%;padding:16px;background:var(--blue);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;margin-top:10px;}

/* Custom Summary View */
.sum-tabs{display:flex;gap:5px;margin-bottom:15px;}
.sum-tab{flex:1;padding:6px;font-size:11px;background:var(--bg3);border:none;color:var(--text2);border-radius:6px;}
.sum-tab.active{background:var(--blue);color:white;}
.hist-item{display:flex;justify-content:space-between;padding:10px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:13px;}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="nav-row">
      <button class="nav-btn" onclick="changeDate(-1)">‹</button>
      <div>
        <div id="display-day" style="font-size:12px; color:var(--text2); text-transform:uppercase">Lundi</div>
        <div id="display-date" style="font-size:18px; font-weight:700">14 Mars</div>
      </div>
      <button class="nav-btn" onclick="changeDate(1)">›</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('day', this)">JOURNÉE</button>
    <button class="tab" onclick="switchTab('sum', this)">RÉSUMÉS</button>
  </div>

  <div class="content">
    <!-- PANNEAU JOURNEE -->
    <div id="p-day" class="panel active">
      
      <!-- MIDI -->
      <div class="card" id="card-midi">
        <div class="card-hd"><span class="tag">Service Midi</span><span class="dur-tag" id="dur-m">0h00</span><button class="btn-tog" id="tog-midi" onclick="toggleSvc('midi')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums" id="dr-mi-in-h"></div><div class="drums" id="dr-mi-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums" id="dr-mi-out-h"></div><div class="drums" id="dr-mi-out-m"></div></div>
      </div>

      <!-- SOIR -->
      <div class="card" id="card-soir">
        <div class="card-hd"><span class="tag">Service Soir</span><span class="dur-tag" id="dur-s">0h00</span><button class="btn-tog" id="tog-soir" onclick="toggleSvc('soir')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums" id="dr-so-in-h"></div><div class="drums" id="dr-so-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums" id="dr-so-out-h"></div><div class="drums" id="dr-so-out-m"></div></div>
      </div>

      <!-- CONTINUE -->
      <div class="card" id="card-full">
        <div class="card-hd"><span class="tag">Journée Continue</span><span class="dur-tag" id="dur-f">0h00</span><button class="btn-tog" id="tog-full" onclick="toggleSvc('full')">OFF</button></div>
        <div class="row"><span class="lbl">Début</span><div class="drums" id="dr-fu-in-h"></div><div class="drums" id="dr-fu-in-m"></div></div>
        <div class="row"><span class="lbl">Fin</span><div class="drums" id="dr-fu-out-h"></div><div class="drums" id="dr-fu-out-m"></div></div>
      </div>

      <div class="res-bar">
        <div class="res-item"><label>MIDI</label><span id="sm">0h00</span></div>
        <div class="res-item"><label>SOIR</label><span id="ss">0h00</span></div>
        <div class="res-item"><label>CONT.</label><span id="sf">0h00</span></div>
        <div class="res-item"><label>TOTAL</label><span id="stot" style="color:var(--blue)">0h00</span></div>
      </div>
      <button class="save-btn" onclick="saveData()">ENREGISTRER</button>
    </div>

    <!-- PANNEAU RESUME -->
    <div id="p-sum" class="panel">
      <div class="sum-tabs">
        <button class="sum-tab active" onclick="setSumRange('week', this)">SEMAINE</button>
        <button class="sum-tab" onclick="setSumRange('month', this)">MOIS</button>
        <button class="sum-tab" onclick="setSumRange('year', this)">ANNÉE</button>
      </div>
      <div id="sum-header" style="text-align:center; margin-bottom:15px; font-weight:700;"></div>
      <div class="card" style="text-align:center">
        <div class="tag">Total Période</div>
        <div id="sum-total" style="font-size:32px; font-weight:800; color:var(--blue); margin:10px 0;">0h00</div>
      </div>
      <div id="sum-list"></div>
    </div>
  </div>
</div>

<script>
const HOURS = Array.from({length: 24}, (_, i) => i);
const MINS = Array.from({length: 60}, (_, i) => i);
const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let state = {
  date: new Date(),
  range: 'week',
  services: {
    midi: { on: false, inH: 11, inM: 0, outH: 15, outM: 0 },
    soir: { on: false, inH: 18, inM: 30, outH: 23, outM: 0 },
    full: { on: false, inH: 9, inM: 0, outH: 17, outM: 0 }
  }
};

// --- LOGIQUE ROULETTES ---
function createDrum(containerId, values, service, key) {
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="drum-sel"></div><div class="drum-list"></div>`;
  const list = container.querySelector('.drum-list');
  
  // Padding pour le scroll
  [null, ...values, null].forEach(v => {
    const div = document.createElement('div');
    div.className = 'drum-item';
    div.textContent = v !== null ? String(v).padStart(2, '0') : '';
    list.appendChild(div);
  });

  let startY, startIdx;
  container.addEventListener('touchstart', e => {
    if(!state.services[service].on) return;
    startY = e.touches[0].clientY;
    startIdx = state.services[service][key];
  }, {passive: true});

  container.addEventListener('touchmove', e => {
    if(!state.services[service].on) return;
    e.preventDefault();
    const diff = Math.round((startY - e.touches[0].clientY) / 30);
    let newIdx = startIdx + diff;
    newIdx = Math.max(0, Math.min(values.length - 1, newIdx));
    state.services[service][key] = newIdx;
    updateDrumPos(container, newIdx);
    renderDay();
  }, {passive: false});
}

function updateDrumPos(container, idx) {
  const list = container.querySelector('.drum-list');
  list.style.transform = `translateY(${-(idx * 30)}px)`;
}

// --- LOGIQUE METIER ---
function calcDur(s) {
  if(!s.on) return 0;
  let start = s.inH * 60 + s.inM;
  let end = s.outH * 60 + s.outM;
  if(end <= start) end += 1440;
  return end - start;
}

function fmtH(mins) {
  return Math.floor(mins/60) + 'h' + String(mins%60).padStart(2,'0');
}

function toggleSvc(type) {
  state.services[type].on = !state.services[type].on;
  // Exclusivité journée continue
  if(type === 'full' && state.services.full.on) {
    state.services.midi.on = false; state.services.soir.on = false;
  } else if(state.services.full.on) {
    state.services.full.on = false;
  }
  renderDay();
}

function renderDay() {
  const d = state.date;
  document.getElementById('display-day').textContent = DAYS[d.getDay()];
  document.getElementById('display-date').textContent = d.getDate() + ' ' + MONTHS[d.getMonth()];

  let total = 0;
  ['midi','soir','full'].forEach(k => {
    const s = state.services[k];
    const dur = calcDur(s);
    total += dur;
    
    document.getElementById(`tog-${k}`).className = 'btn-tog' + (s.on ? ' active':'');
    document.getElementById(`tog-${k}`).textContent = s.on ? 'EN SERVICE' : 'OFF';
    document.getElementById(`card-${k}`).style.opacity = s.on ? '1' : '0.4';
    document.getElementById(`dur-${k.charAt(0)}`).textContent = fmtH(dur);
    
    const pfx = k === 'midi'?'mi':(k==='soir'?'so':'fu');
    updateDrumPos(document.getElementById(`dr-${pfx}-in-h`), s.inH);
    updateDrumPos(document.getElementById(`dr-${pfx}-in-m`), s.inM);
    updateDrumPos(document.getElementById(`dr-${pfx}-out-h`), s.outH);
    updateDrumPos(document.getElementById(`dr-${pfx}-out-m`), s.outM);
  });

  document.getElementById('sm').textContent = fmtH(calcDur(state.services.midi));
  document.getElementById('ss').textContent = fmtH(calcDur(state.services.soir));
  document.getElementById('sf').textContent = fmtH(calcDur(state.services.full));
  document.getElementById('stot').textContent = fmtH(total);
}

// --- STORAGE & TABS ---
function saveData() {
  const key = state.date.toISOString().split('T')[0];
  localStorage.setItem('work_'+key, JSON.stringify(state.services));
  alert("C'est enregistré !");
  if(document.getElementById('p-sum').classList.contains('active')) renderSummary();
}

function changeDate(n) {
  state.date.setDate(state.date.getDate() + n);
  const saved = localStorage.getItem('work_'+state.date.toISOString().split('T')[0]);
  if(saved) state.services = JSON.parse(saved);
  renderDay();
  if(document.getElementById('p-sum').classList.contains('active')) renderSummary();
}

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  el.classList.add('active');
  if(id === 'sum') renderSummary();
}

function setSumRange(r, el) {
  state.range = r;
  document.querySelectorAll('.sum-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSummary();
}

function renderSummary() {
  const list = document.getElementById('sum-list');
  const head = document.getElementById('sum-header');
  list.innerHTML = '';
  let totalMins = 0;
  
  const now = new Date(state.date);
  let start = new Date(now);
  
  if(state.range === 'week') {
    const day = (now.getDay() + 6) % 7;
    start.setDate(now.getDate() - day);
    head.textContent = "Semaine du " + start.getDate() + " " + MONTHS[start.getMonth()];
    for(let i=0; i<7; i++) {
      totalMins += addSumItem(new Date(start), list);
      start.setDate(start.getDate() + 1);
    }
  } else if(state.range === 'month') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    head.textContent = MONTHS[now.getMonth()] + " " + now.getFullYear();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    for(let i=0; i<daysInMonth; i++) {
      totalMins += addSumItem(new Date(start), list);
      start.setDate(start.getDate() + 1);
    }
  } else {
    head.textContent = "Année " + now.getFullYear();
    // Pour l'année, on affiche juste le total par mois pour éviter une liste trop longue
    for(let m=0; m<12; m++) {
      let monthMins = 0;
      for(let d=1; d<=31; d++){
        const key = `work_${now.getFullYear()}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const data = localStorage.getItem(key);
        if(data) {
          const s = JSON.parse(data);
          monthMins += calcDur(s.midi) + calcDur(s.soir) + calcDur(s.full);
        }
      }
      if(monthMins > 0) {
        list.innerHTML += `<div class="hist-item"><b>${MONTHS[m]}</b><span>${fmtH(monthMins)}</span></div>`;
        totalMins += monthMins;
      }
    }
  }
  document.getElementById('sum-total').textContent = fmtH(totalMins);
}

function addSumItem(d, container) {
  const key = 'work_'+d.toISOString().split('T')[0];
  const saved = localStorage.getItem(key);
  if(!saved) return 0;
  const s = JSON.parse(saved);
  const dayDur = calcDur(s.midi) + calcDur(s.soir) + calcDur(s.full);
  if(dayDur > 0) {
    const row = document.createElement('div');
    row.className = 'hist-item';
    row.innerHTML = `<span>${DAYS[d.getDay()].slice(0,3)} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}</span><b>${fmtH(dayDur)}</b>`;
    container.appendChild(row);
  }
  return dayDur;
}

// Init
const svcs = ['mi','so','fu'];
const types = ['midi','soir','full'];
types.forEach((t, i) => {
  const p = svcs[i];
  createDrum(`dr-${p}-in-h`, HOURS, t, 'inH');
  createDrum(`dr-${p}-in-m`, MINS, t, 'inM');
  createDrum(`dr-${p}-out-h`, HOURS, t, 'outH');
  createDrum(`dr-${p}-out-m`, MINS, t, 'outM');
});

// Charger la date du jour au lancement
const todayKey = state.date.toISOString().split('T')[0];
if(localStorage.getItem('work_'+todayKey)) state.services = JSON.parse(localStorage.getItem('work_'+todayKey));

renderDay();
</script>
</body>
</html>
